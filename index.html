<!doctype html>
<html lang="fr">
<head>
	<meta charset="utf-8">
	<title>GoDice Controller</title>
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
	<link rel="stylesheet" href="style.css" type="text/css" media="all">
	<script src="godice.js"></script>
	<script src="main.js" defer></script>
</head>

<body>
	<header class="app-header">
		<div class="header-content">
			<div class="logo-area">
				<div class="logo-icon"></div>
				<div class="logo-text">
					<h1>GoDice Controller</h1>
					<span class="tagline">Contrôlez vos dés connectés</span>
				</div>
			</div>
			<button onclick="openConnectionDialog()" class="connect-btn">
				<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12.55a11 11 0 0 1 14.08 0"/><path d="M1.42 9a16 16 0 0 1 21.16 0"/><path d="M8.53 16.11a6 6 0 0 1 6.95 0"/><line x1="12" y1="20" x2="12.01" y2="20"/></svg>
				Connecter un dé
			</button>
		</div>
	</header>

	<main class="app-main">
		<div id="gocube-message" class="message-area"></div>
		<div id="dice-host" class="dice-grid"></div>

		<div id="empty-state" class="empty-state">
			<div class="empty-icon">
				<svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"/><path d="M16 8h.01"/><path d="M8 8h.01"/><path d="M8 16h.01"/><path d="M16 16h.01"/><path d="M12 12h.01"/></svg>
			</div>
			<h2>Aucun dé connecté</h2>
			<p>Cliquez sur <strong>"Connecter un dé"</strong> pour commencer.</p>
		</div>
	</main>
</body>
</html>
